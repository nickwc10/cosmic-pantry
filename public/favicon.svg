<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- background -->
  <rect width="32" height="32" rx="6" fill="#0d1b3e"/>

  <!-- stars -->
  <circle cx="4"  cy="4"  r="0.8" fill="white" opacity="0.8"/>
  <circle cx="27" cy="5"  r="0.6" fill="white" opacity="0.6"/>
  <circle cx="29" cy="22" r="0.5" fill="white" opacity="0.5"/>
  <circle cx="3"  cy="25" r="0.7" fill="white" opacity="0.6"/>
  <circle cx="28" cy="27" r="0.5" fill="white" opacity="0.4"/>

  <!-- planet body -->
  <circle cx="15" cy="16" r="8" fill="#8aafd4"/>

  <!-- surface shading -->
  <circle cx="15" cy="16" r="8" fill="url(#shade)"/>

  <!-- ring (also reads as a plate rim) - back half -->
  <ellipse cx="15" cy="16" rx="13" ry="3.8" fill="none"
           stroke="#c8a84b" stroke-width="2"
           stroke-dasharray="20.4 20.4" stroke-dashoffset="0"
           opacity="0.6"/>

  <!-- ring - front half (on top of planet) -->
  <ellipse cx="15" cy="16" rx="13" ry="3.8" fill="none"
           stroke="#e8c86a" stroke-width="2"
           stroke-dasharray="20.4 20.4" stroke-dashoffset="20.4"/>

  <!-- fork handle -->
  <line x1="27" y1="11" x2="27" y2="25" stroke="#e0e0e0" stroke-width="1.4" stroke-linecap="round"/>
  <!-- fork tines -->
  <line x1="25" y1="11" x2="25" y2="16" stroke="#e0e0e0" stroke-width="1.1" stroke-linecap="round"/>
  <line x1="27" y1="11" x2="27" y2="16" stroke="#e0e0e0" stroke-width="1.1" stroke-linecap="round"/>
  <line x1="29" y1="11" x2="29" y2="16" stroke="#e0e0e0" stroke-width="1.1" stroke-linecap="round"/>
  <!-- fork neck curve -->
  <path d="M25 16 Q26 18 27 18 Q28 18 29 16" fill="none" stroke="#e0e0e0" stroke-width="1.1"/>

  <defs>
    <radialGradient id="shade" cx="40%" cy="35%" r="60%">
      <stop offset="0%"   stop-color="white"  stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0d1b3e" stop-opacity="0.35"/>
    </radialGradient>
  </defs>
</svg>
